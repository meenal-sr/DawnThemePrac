    - generic [ref=e318]:
      - img "How will SEER2 impact Homeowners?" [ref=e320]
      - generic [ref=e321]:
        - heading "How will SEER2 impact Homeowners?" [level=2] [ref=e322]
        - generic [ref=e323]:
          - paragraph [ref=e324]: "There are a couple of ways that homeowners will be affected by the new SEER standards:"
          - paragraph [ref=e325]:
            - strong [ref=e326]: You will save money.
          - paragraph [ref=e327]: About 76 million US homes use central air, and 13 million use heat pumps. Once the new standards go into effect, those households collectively will reduce their energy bills by $2.5 - $12 billion over the next 30 years.
          - paragraph [ref=e328]:
            - strong [ref=e329]: The values that measure a unit or system's efficiency are changing.
          - paragraph [ref=e330]: "\"SEER\" as you know it will no longer exist as measurement of an HVAC system's efficiency. This will be completely replaced by \"SEER2\". The values are also changing. For example, 14 SEER will become 13.4 - 14.3 SEER2. 16 SEER will become 15.2-15.4 SEER2."
